name: Security & Quality Checks

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  schedule:
    # Run weekly on Monday at 07:00 UTC to catch newly-disclosed vulnerabilities
    - cron: '0 7 * * 1'

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Backend — Python dependency vulnerability scan + unit tests
  # ──────────────────────────────────────────────────────────────────
  backend-security:
    name: Backend Security & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies for known vulnerabilities
        # --desc shows the advisory description; exit code non-zero if vulns found
        run: pip-audit --desc --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Run Django system checks
        env:
          SECRET_KEY: ci-only-not-a-real-secret-key-1234567890
          FRONTEND_URL: http://localhost:3000
        run: python manage.py check --deploy 2>&1 || true
        # --deploy runs the full security checklist; we allow failure here
        # because HTTPS settings are not active in CI (no TLS)

      - name: Run unit tests
        env:
          SECRET_KEY: ci-only-not-a-real-secret-key-1234567890
          FRONTEND_URL: http://localhost:3000
        run: python manage.py test --verbosity=2

  # ──────────────────────────────────────────────────────────────────
  # Frontend — npm vulnerability scan + build
  # ──────────────────────────────────────────────────────────────────
  frontend-security:
    name: Frontend Security & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies (high + critical only)
        # --audit-level=high fails the job only on high/critical severity
        run: npm audit --audit-level=high

      - name: Build production bundle
        run: npm run build
        env:
          CI: false
          # CI=false prevents warnings being treated as errors during build
