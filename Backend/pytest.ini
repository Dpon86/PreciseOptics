# pytest configuration for PreciseOptics
# https://docs.pytest.org/

[pytest]
DJANGO_SETTINGS_MODULE = precise_optics.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --strict-markers
    --disable-warnings
    --tb=short
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-config=.coveragerc
testpaths = 
    accounts/tests
    patients/tests
    medications/tests
    consultations/tests
    eye_tests/tests
    treatments/tests
    conditions/tests
    protocols/tests
    referrals/tests
    audit/tests
    reports/tests
markers =
    unit: Unit tests (fast, no database)
    integration: Integration tests (database required)
    api: API endpoint tests
    slow: Slow tests (may take >5 seconds)
    security: Security-related tests
    smoke: Smoke tests (quick validation)

# Coverage settings
[coverage:run]
source = .
omit = 
    */migrations/*
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*
    manage.py
    */wsgi.py
    */asgi.py

[coverage:report]
precision = 2
skip_covered = False
skip_empty = True
